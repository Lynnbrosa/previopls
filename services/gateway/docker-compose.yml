services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: previopls
      POSTGRES_PASSWORD: previopls
      POSTGRES_DB: previopls
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U previopls -d previopls"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://previopls:previopls@db:5432/previopls
    volumes:
      - ./keys:/app/keys:ro
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"
    # Sem ports: o backend NÃO é exposto na rede do host.
    # Todo o tráfego passa pelo nginx em 443.

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - api

volumes:
  pgdata:
