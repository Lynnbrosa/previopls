user  nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events { worker_connections 1024; }

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    server_tokens off;
    client_max_body_size 1m;
    client_body_buffer_size 16k;
    large_client_header_buffers 4 8k;

    keepalive_timeout 30s;
    send_timeout 30s;
    client_body_timeout 15s;
    client_header_timeout 15s;

    limit_req_zone $binary_remote_addr zone=api_global:10m rate=100r/m;
    limit_req_zone $binary_remote_addr zone=api_login:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=api_llm:10m rate=10r/m;
    limit_req_status 429;

    log_format json_combined escape=json
        '{"time":"$time_iso8601","remote_addr":"$remote_addr",'
        '"request":"$request","status":$status,"body_bytes_sent":$body_bytes_sent,'
        '"http_referer":"$http_referer","http_user_agent":"$http_user_agent",'
        '"request_id":"$http_x_request_id"}';
    access_log /var/log/nginx/access.log json_combined;

    upstream gateway_upstream {
        server gateway:8000;
        keepalive 16;
    }

    upstream admin_web_upstream {
        server admin-web:3000;
        keepalive 16;
    }

    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-Host  $host;
    proxy_read_timeout 30s;
    proxy_connect_timeout 5s;
    proxy_send_timeout 30s;

    server {
        listen 80 default_server;
        server_name _;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        http2 on;
        server_name _;

        ssl_certificate     /etc/nginx/certs/dev.crt;
        ssl_certificate_key /etc/nginx/certs/dev.key;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=()" always;

        location = /api/health {
            proxy_pass http://gateway_upstream/health;
            access_log off;
        }

        location = /api/v1/auth/login {
            limit_req zone=api_login burst=2 nodelay;
            rewrite ^/api/(.*)$ /$1 break;
            proxy_pass http://gateway_upstream;
        }

        location /api/v1/llm-assist {
            limit_req zone=api_llm burst=3 nodelay;
            rewrite ^/api/(.*)$ /$1 break;
            proxy_pass http://gateway_upstream;
        }

        location /api/ {
            limit_req zone=api_global burst=20 nodelay;
            rewrite ^/api/(.*)$ /$1 break;
            proxy_pass http://gateway_upstream;
        }

        location /_next/ {
            proxy_pass http://admin_web_upstream;
        }

        location / {
            proxy_pass http://admin_web_upstream;
        }
    }
}
