spring:
  application:
    name: previo-pls
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/previopls}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
      naming:
        physical-strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
    properties:
      hibernate:
        format_sql: false
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  port: 5000
  error:
    include-stacktrace: never
    include-message: never
    include-binding-errors: never
    include-exception: false
  servlet:
    session:
      timeout: 30m
      tracking-modes: COOKIE
      cookie:
        http-only: true
        secure: true
        same-site: strict

app:
  jwt:
    secret: ${JWT_SECRET:dev-only-change-me-this-key-must-be-at-least-32-bytes-long}
    expiration-hours: ${JWT_EXPIRATION_HOURS:8}
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:8081,http://localhost:19006}
  info:
    version: v1
    build: 1.0.0
  crypto:
    # Base64 de 32 bytes (AES-256). Em produção: variável de ambiente apontando para KMS/Vault.
    # NUNCA commitar uma chave real neste arquivo.
    key: ${APP_CRYPTO_KEY:cHJldmlvcGxzLWRldi1rZXktMzItYnl0ZXMtWFhYWFg=}
  security:
    lockout:
      max-attempts: ${LOCKOUT_MAX_ATTEMPTS:5}
      window-minutes: ${LOCKOUT_WINDOW_MINUTES:15}
    rate-limit:
      login-per-minute: ${RATE_LIMIT_LOGIN:5}
      default-per-minute: ${RATE_LIMIT_DEFAULT:200}

springdoc:
  swagger-ui:
    path: /docs
    operations-sorter: alpha
    tags-sorter: alpha
  api-docs:
    path: /v3/api-docs

logging:
  level:
    root: INFO
    org.hibernate.SQL: WARN
    org.springframework.web: INFO
